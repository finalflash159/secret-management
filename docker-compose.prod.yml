services:
  postgres:
    image: postgres:16
    container_name: secret-manager-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secret_manager
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: gondor-next-app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/secret_manager
      NODE_ENV: production
      NEXTAUTH_URL: https://app.g-ondo-r.dev
      NEXTAUTH_SECRET: zane_secret_key_123
      AUTH_SECRET: zane_secret_key_123
      AUTH_TRUST_HOST: "true"
      ALLOW_SELF_REGISTRATION: "false"
      MASTER_SUPER_ADMIN_EMAIL: "admin@yourcompany.com"
      MASTER_INVITE_CODE: "generate-a-strong-random-code-here"
      MASTER_KEY: zane_master_encryption_key_2026 
    command: sh -c "npx prisma@5.22.0 db push --schema=/app/node_modules/.prisma/client/schema.prisma --skip-generate && node server.js"

volumes:
  postgres_data: