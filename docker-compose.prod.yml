services:
  postgres:
    image: postgres:16
    container_name: secret-manager-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secret_manager
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gondor-next-app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/secret_manager
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://app.g-ondo-r.dev}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      MASTER_KEY: ${MASTER_KEY}
      SUPER_MASTER_ADMIN: ${SUPER_MASTER_ADMIN:-false}
      CRON_SECRET: ${CRON_SECRET}
      BOOTSTRAP_EMAIL: ${BOOTSTRAP_EMAIL:-}
      BOOTSTRAP_PASSWORD: ${BOOTSTRAP_PASSWORD:-}
      BOOTSTRAP_NAME: ${BOOTSTRAP_NAME:-}
    command: >
      sh -c "
        npx prisma db push --skip-generate &&
        if [ -n \"$$BOOTSTRAP_EMAIL\" ] && [ -n \"$$BOOTSTRAP_PASSWORD\" ]; then
          npx prisma db seed;
        fi &&
        node server.js
      "

volumes:
  postgres_data:
