services:
  postgres:
    image: postgres:16
    container_name: secret-manager-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secret_manager
    # [SECURITY FIX]: Removed ports "5432:5432" to prevent external botnet access.
    # The Next.js app can still connect securely via the internal Docker network.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: gondor-next-app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/secret_manager
      NODE_ENV: production
      # [FIX]: Required environment variables to resolve Auth.js errors
      AUTH_SECRET: "zane_secret_key_123"
      AUTH_TRUST_HOST: "true"
      ALLOW_SELF_REGISTRATION: "false"
      INVITE_CODES: finalflash159
      PRISMA_CLI_QUERY_ENGINE_TYPE: binary
      PRISMA_CLIENT_ENGINE_TYPE: binary
    # [FIX]: Auto-sync DB on startup, bypassing Prisma 7 version mismatch error
    command: sh -c "npx prisma@5.22.0 db push --schema=/app/node_modules/.prisma/client/schema.prisma && node server.js"

volumes:
  postgres_data: